name: Product CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # BẮT BUỘC: Sử dụng NodeJS v22 để phòng tránh các lỗi trên Node cũ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # --- KIỂM THỬ VÀ BUILD FRONTEND ---
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          npm ci
          # LƯU Ý: Khắc phục lỗi thiếu native binding của build tool (Vite/Esbuild) trên runner Linux
          npm install @esbuild/linux-x64 --no-save || true

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # --- KIỂM THỬ BACKEND ---
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: backend
        run: npm run test -- --run
