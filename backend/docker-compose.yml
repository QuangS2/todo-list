version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: todolist-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todolist
    ports:
      - "5432:5432"
    volumes:
      # Lưu trữ dữ liệu lâu bền tránh mất mát khi stop/down container
      - pgdata:/var/lib/postgresql/data
      # Tự động nạp schema.sql để tạo bảng khi container khởi chạy lần đầu tiên (ở product/backend/)
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  pgdata:
